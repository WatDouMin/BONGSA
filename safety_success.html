<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보보호 캠페인 - 안전 확인</title>
    <style>
        /* 1. 안도감을 주는 그린 & 화이트 톤 */
        
        body {
            background-color: #f0fdf4;
            color: #166534;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        .success-card {
            background: #ffffff;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(22, 101, 52, 0.1);
            max-width: 500px;
            width: 90%;
        }
        /* 2. 성공 아이콘 (체크 표시) */
        
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #15803d;
        }
        
        .highlight {
            background: #dcfce7;
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        p {
            line-height: 1.6;
            color: #374151;
            margin-bottom: 25px;
        }
        /* 3. 버튼 디자인 */
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background-color: #16a34a;
        }
        /* 축하 효과 (간단히) */
        
        .badge {
            display: inline-block;
            margin-top: 10px;
            font-size: 13px;
            color: #16a34a;
            border: 1px solid #16a34a;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="icon">이것은 정보보호 캠페인의 일부입니다.</div>
        <h1>훌륭합니다! 당신은 안전합니다.</h1>

        <p>
            대부분의 사람들은 이용약관을 읽지 않고 지나치지만,<br> 당신은 숨겨진 <span class="highlight">인증 코드(! 추가)</span>를 찾아냈습니다.
        </p>

        <p>간식도 드리겠습니다~</p>

        <p>지금의 꼼꼼한 습관이 당신의 소중한 개인정보를 지키는 가장 강력한 방패입니다.</p>
    </div>
</body>

</html>
